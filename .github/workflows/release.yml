name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install deps
        run: sudo apt-get update -y && sudo apt-get install -y build-essential pkg-config libgtk-3-dev
      - name: Build port
        run: make port
      - name: Prepare asset
        run: |
          cp -f priv/minigui ./minigui
          sha256sum ./minigui > ./minigui.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: linux-assets
          path: |
            minigui
            minigui.sha256

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup MSVC dev cmd
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64
      - name: Build port (MSVC)
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force priv | Out-Null
          cl /O2 /Fe:priv\minigui.exe c_src\minigui_port.c user32.lib gdi32.lib
          Copy-Item priv\minigui.exe .\minigui.exe -Force
          (Get-FileHash .\minigui.exe -Algorithm SHA256).Hash.ToLower() + "  minigui.exe" | Out-File -Encoding ascii .\minigui.exe.sha256
      - uses: actions/upload-artifact@v4
        with:
          name: windows-assets
          path: |
            minigui.exe
            minigui.exe.sha256

  publish:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches gleam.toml version
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          TOML_VERSION="$(python3 - <<'PY'
          import re
          import pathlib
          txt = pathlib.Path('gleam.toml').read_text(encoding='utf-8')
          m = re.search(r'^version\s*=\s*"([^"]+)"\s*$', txt, re.M)
          print(m.group(1) if m else '')
          PY
          )"
          echo "tag=$TAG version=$VERSION gleam.toml=$TOML_VERSION"
          test -n "$TOML_VERSION"
          test "$VERSION" = "$TOML_VERSION"

      - name: Setup Erlang + Gleam
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.17.0"
          rebar3-version: "3"

      - name: Publish to Hex
        env:
          HEXPM_API_KEY: ${{ secrets.HEXPM_API_KEY }}
        run: |
          if [ -z "$HEXPM_API_KEY" ]; then
            echo "HEXPM_API_KEY is not set; skipping Hex publish."
            exit 0
          fi
          printf "I am not using semantic versioning\n" | gleam publish

      - uses: actions/download-artifact@v4
        with:
          path: dist
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            Recommended: use minigui >= 0.1.3.
          files: |
            dist/linux-assets/minigui
            dist/linux-assets/minigui.sha256
            dist/windows-assets/minigui.exe
            dist/windows-assets/minigui.exe.sha256

      - name: Smoke test (fresh project)
        shell: bash
        run: |
          set -euo pipefail

          VERSION="${GITHUB_REF_NAME#v}"
          WORKDIR="$(mktemp -d)"
          cd "$WORKDIR"

          cat > gleam.toml <<'TOML'
          name = "minigui_smoke"
          version = "0.0.0"
          target = "erlang"

          [dependencies]
          gleam_stdlib = ">= 1.0.0 and < 2.0.0"
          TOML

          mkdir -p src
          cat > src/main.gleam <<'GLEAM'
          import minigui

          pub fn main() {
            let Ok(gui) = minigui.start()
            let Ok(_) = minigui.create_window(gui, "minigui smoke test")
            let Ok(_) = minigui.quit(gui)
            Nil
          }
          GLEAM

          gleam add minigui@"$VERSION"
          MINIGUI_HEADLESS=1 gleam run
